<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Triskel QR</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: #0f0f0f;
      color: #fff;
      font-family: system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .card {
      background: #1a1a1a;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      width: 100%;
      max-width: 380px;
      text-align: center;
    }

    h2 {
      margin-bottom: 20px;
      font-weight: 600;
    }

    textarea {
      width: 100%;
      height: 90px;
      border-radius: 10px;
      border: none;
      padding: 10px;
      font-size: 14px;
      resize: none;
      outline: none;
      background: #2a2a2a;
      color: #fff;
    }

    select {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: none;
      background: #2a2a2a;
      color: #fff;
      font-size: 14px;
      outline: none;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #00c853;
      color: #000;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #00e676;
    }

    .spacer {
      height: 15px;
    }

    .hint {
      font-size: 12px;
      color: #aaa;
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <div class="card">
    <h2>Generar QR</h2>

    <form action="/generate" method="POST">
      <textarea 
        name="text" 
        placeholder="Ej: Baño a la derecha" 
        required>
      </textarea>

      <div class="spacer"></div>

      <select name="type">
        <option value="plain">🔐 QR Seguro (encriptado)</option>
        <option value="smart">🌐 QR Inteligente (URL)</option>
      </select>

      <div class="spacer"></div>

      <button type="submit">Generar QR</button>
    </form>

    <div class="hint">
      QR seguro solo funciona con la app Triskel
    </div>
  </div>

</body>
</html>
